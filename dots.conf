# ── Dots Configuration ──────────────────────────────────────
# Central config for all Dots scripts.
# Edit this file to manage which configs and packages are tracked.

# Configs to manage: package_dir = config_dir
# package_dir = directory name in Dots/
# config_dir = directory name in ~/.config/
[configs]
hyprland = hypr
kitty = kitty
fish = fish
fuzzel = fuzzel
better-control = better-control
fastfetch = fastfetch
nvim = nvim
mako = mako
waybar = waybar

# System packages to install/uninstall
[packages]
official = hyprland,kitty,fish,fuzzel,cliphist,wl-clipboard,inotify-tools,fastfetch,nvim,mako,waybar,swaybg
aur = aylurs-gtk-shell,libastal-git,libastal-4-git,better-control,waybar-module-music-git
